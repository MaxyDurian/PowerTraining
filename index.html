<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" width="device-width",initial scale="1.0">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/responsive.css">
        <link rel="stylesheet" href="css/animations.css">
    </head>
    <body>
    <header>
        <h1>Power Training</h1>
        <h2>Entrena como un profesional</h2>
    </header>
    <nav>
        <a href="#">Entrenadores</a>
        <a href="#">Planes</a>
        <a href="#">Contacto</a>
    </nav>
    <main>
        <div class="fondo">
            <p class="texto-frontal">Mejora tu fuerza y capacidades fisicas con entrenamientos profesionales</p>
        </div>
        <div class="btn">
            <button>Comenzar</button>
        </div>
        <h3>Servicios</h3>
        <div class="grid-contenedor">
        <div class="card">
            <img src="images/crossfit.jpg" height="150" width="200" alt="Cross-Fit">
            <h3 class="card-titulo">Cross-Fit</h3>
            <p class="card-desc">Intesidad y Velocidad</p>
        </div>
        <div class="card">
            <img src="images/musculacion.jpg" height="150" width="200" alt="Musculacion">
            <h3 class="card-titulo">Musculacion</h3>
            <p class="card-desc">Ganancia Muscular</p>
        </div>
        <div class="card">
            <img src="images/funcional (1).jpg" height="150" width="200" alt="Entrenamiento Funcional">
            <h3 class="card-titulo">Funcional</h3>
            <p class="card-desc">Entrenamiento Integral</p>
        </div>
        <div class="card">
            <img src="images/hitt.jpg" height="150" width="200" alt="HIIT">
            <h3 class="card-titulo">HIIT</h3>
            <p class="card-desc">Entrenamiento de alta intesidad</p>
        </div>
        </div>
    <div class="social">
        <a href="#"><i class="fa-brands fa-facebook"><img src="icons/facebook.png" height="70"></i></a>
        <a href="#"><i class="fa-brands fa-instagram"><img src="icons/instagram.png" height="70"></i></a>
        <a href="#"><i class="fa-brands fa-whatsapp"><img src="icons/whatsapp.png" height="70"></i></a>
    </div>
    </main>
    </body>
</html>
